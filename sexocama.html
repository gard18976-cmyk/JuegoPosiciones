<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- CONSEJO PRO (imprescindible para móviles) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Imagen aleatoria</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    #contenedor {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* pantalla completa real */
    }

    #cuadro {
      flex: 1;
      border: 2px solid black;

      /* centrado perfecto */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #cuadro img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* no se deforma */
    }

    #boton {
      height: 60px;
      font-size: 20px;
      border: none;
      background-color: #333;
      color: white;
    }

    #boton:active {
      background-color: #555;
    }
  </style>
</head>

<body>

  <div id="contenedor">
    <div id="cuadro"></div>
    <button id="boton">hola</button>
  </div>

  <script src="js/aleatoriocama.js"></script>

</body>
</html>
